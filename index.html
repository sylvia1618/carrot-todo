<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>萝卜 To Do</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🥕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
body{background:#f6d9bf;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.tab-bar{display:flex;background:rgba(255,248,240,.95);border-top:1px solid rgba(190,132,74,.18);padding:10px 8px 14px;gap:4px;flex-shrink:0;box-shadow:0 -6px 16px rgba(140,85,47,.08)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;transition:transform .12s;user-select:none}
.tab-item:active{transform:scale(.96)}
.tab-icon-wrap{width:34px;height:34px;border-radius:17px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.6);border:1px solid rgba(190,132,74,.12);transition:all .2s}
.tab-icon-wrap.active{background:rgba(255,236,218,.96);border-color:rgba(255,143,58,.22);box-shadow:0 4px 10px rgba(140,85,47,.06)}
.tab-icon{font-size:16px}
.tab-label{font-size:11px;font-weight:700;color:#a06b3b}
.tab-label.active{color:#ff8f3a}
.page-container{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:14px 20px 20px;opacity:0;pointer-events:none;transition:opacity .25s;-webkit-overflow-scrolling:touch}
.page.active{opacity:1;pointer-events:auto}
.kicker{font-size:13px;font-weight:700;color:#a06b3b;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
.title{font-size:32px;font-weight:900;color:#2d1e10;letter-spacing:-.5px;line-height:1.1}
.subtitle{color:#7d5c44;font-size:15px;line-height:22px;margin-top:4px}
.section{background:rgba(255,250,242,.76);border:1px solid rgba(190,132,74,.14);border-radius:28px;padding:16px}
.section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.section-title{font-size:17px;font-weight:800;color:#2d1e10}
.section-meta{font-size:12px;font-weight:700;color:#a06b3b}
.btn{display:block;width:100%;padding:14px;border-radius:16px;background:#ff9a4d;color:#fffaf4;font-weight:800;font-size:16px;border:none;cursor:pointer;text-align:center;box-shadow:0 6px 10px rgba(179,93,20,.12);transition:transform .08s,opacity .08s;user-select:none}
.btn:active{transform:scale(.98);opacity:.94}
.page::-webkit-scrollbar{width:4px}
.page::-webkit-scrollbar-track{background:transparent}
.page::-webkit-scrollbar-thumb{background:rgba(160,107,59,.2);border-radius:2px}
.hero-area{display:flex;flex-direction:column;align-items:center;margin:10px 0}
.hero-rings{position:relative;width:240px;height:240px;display:flex;align-items:center;justify-content:center}
.ring-dot{position:absolute;width:18px;height:18px;border-radius:50%;transition:background .3s}
.hero-core{width:120px;height:120px;border-radius:50%;background:rgba(255,250,242,.92);border:1px solid rgba(190,132,74,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 18px rgba(140,85,47,.08);z-index:2}
.hero-emoji{font-size:28px}
.hero-num{font-size:38px;font-weight:900;color:#ff8f3a;letter-spacing:-1px;line-height:1}
.stat-band{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:24px;background:rgba(255,248,240,.58);border:1px solid rgba(190,132,74,.12);margin:12px 0}
.stat-item{flex:1}
.stat-div{width:1px;height:22px;background:rgba(190,132,74,.12)}
.stat-lb{color:#a06b3b;font-size:12px;font-weight:700;letter-spacing:.4px}
.stat-val{color:#2d1e10;font-size:17px;font-weight:800;margin-top:2px}
.habit-rail{display:flex;gap:10px;padding:10px;background:rgba(255,248,240,.54);border:1px solid rgba(190,132,74,.1);border-radius:22px;margin-top:12px}
.habit-pill{flex:1;padding:12px 0;text-align:center;border-radius:21px;background:rgba(255,255,255,.44);border:1px solid rgba(255,255,255,.45);font-weight:700;font-size:13px;color:#2d1e10;cursor:pointer;transition:transform .08s;user-select:none}
.habit-pill:active{transform:scale(.97)}.task-text{font-size:18px;font-weight:800;color:#2d1e10;margin-bottom:10px}.status-strip{background:rgba(255,250,242,.82);border-radius:20px;padding:14px 16px;border:1px solid rgba(190,132,74,.16);margin-top:12px;color:#7d5c44;font-weight:600}
.input-field{background:rgba(255,255,255,.5);border-radius:18px;padding:12px 14px;color:#2d1e10;border:1px solid rgba(190,132,74,.12);font-size:15px;outline:none;width:100%;font-family:inherit}
.plan-row{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:20px;background:rgba(255,255,255,.42);border:1px solid rgba(190,132,74,.12);margin-bottom:8px;cursor:pointer;user-select:none}
.plan-row:active{opacity:.92}.plan-row.done{background:rgba(255,236,218,.9)}.plan-name{font-size:16px;font-weight:800;color:#2d1e10}.plan-note{margin-top:2px;color:#7d5c44;font-size:13px}.plan-state{color:#a06b3b;font-weight:800}.plan-state.done{color:#ff8f3a}
.machine-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;position:relative}.machine-halo{width:240px;height:240px;border-radius:50%;background:rgba(255,247,236,.9);border:1px solid rgba(190,132,74,.14);position:absolute}.machine-card{position:relative;width:100%;max-width:320px;background:rgba(255,250,242,.92);border-radius:32px;padding:24px;border:1px solid rgba(190,132,74,.16);display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 10px 18px rgba(140,85,47,.08)}.machine-emoji{font-size:52px}.machine-name{font-size:20px;font-weight:800;color:#2d1e10}.machine-desc{color:#7d5c44;text-align:center;line-height:20px}.rule-pill{background:rgba(255,248,240,.8);border-radius:999px;padding:12px 16px;border:1px solid rgba(190,132,74,.14);text-align:center;color:#7d5c44;font-size:14px}.col-item{padding:14px;border-radius:20px;background:rgba(255,255,255,.44);border:1px solid rgba(190,132,74,.12);margin-top:10px}.item-name{font-weight:800;color:#2d1e10;font-size:16px}.item-rare{color:#ff8f3a;font-weight:700;font-size:13px}.item-desc{color:#7d5c44;line-height:20px;margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(45,30,16,.28);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fadeIn .2s}.modal-box{background:#fffaf4;border-radius:32px;padding:24px;border:1px solid rgba(190,132,74,.18);display:flex;flex-direction:column;align-items:center;gap:10px;max-width:340px;width:100%;animation:scaleIn .25s}.modal-glow{width:68px;height:68px;border-radius:50%;background:#fff0e2;border:1px solid #f1c99d}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{transform:scale(.85)}to{transform:scale(1)}}
.spacer-12{height:12px}.spacer-14{height:14px}.gap-box{display:flex;flex-direction:column;gap:14px}
.c-cta{width:150px;height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none}.c-cta:active{transform:scale(.97)}.c-leaves{position:absolute;top:-4px;width:110px;height:56px}.c-leaf{position:absolute;width:20px;height:34px;border-radius:14px}.c-body{width:126px;height:140px;border-radius:48px;background:#ff9b4d;border:1px solid #ec8b38;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 10px 18px rgba(140,85,47,.12);position:relative;z-index:1}.c-tip{position:absolute;bottom:-12px;width:30px;height:30px;background:#ff9b4d;border-right:1px solid #ec8b38;border-bottom:1px solid #ec8b38;transform:rotate(45deg);border-bottom-right-radius:11px}.c-emoji{font-size:34px}.c-text{color:#fffaf4;font-size:18px;font-weight:800}
.c-card{width:272px;min-height:346px;border-radius:32px;background:rgba(255,167,92,.2);border:1px solid rgba(238,143,63,.16);padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 16px rgba(140,85,47,.1);margin-top:20px;transition:all .3s;animation:scaleIn .3s}.c-head{display:flex;justify-content:space-between;align-items:center}.c-label{font-size:12px;font-weight:700;color:#a06b3b;letter-spacing:1px;text-transform:uppercase}.c-count{font-size:12px;color:#7d5c44;font-weight:600}.c-shell{background:#ff9b4d;border:1px solid #ec8b38;border-radius:34px;padding:12px;flex:1;display:flex;flex-direction:column}.c-edit{flex:1;background:rgba(255,246,235,.34);border-radius:20px;border:1px solid rgba(255,233,212,.22);padding:14px;min-height:150px}.c-edit textarea{width:100%;min-height:120px;border:none;background:transparent;color:#2d1e10;font-size:16px;line-height:24px;resize:none;outline:none;font-family:inherit}
.archive-box{background:rgba(255,250,243,.6);border-radius:28px;border:1px solid rgba(158,107,59,.14);padding:14px;margin-top:10px}.arch-item{background:rgba(255,167,92,.18);border-radius:22px;padding:14px;border:1px solid rgba(238,143,63,.18);margin-bottom:10px}.arch-date{color:#a06b3b;font-size:12px;font-weight:700;letter-spacing:.6px}.arch-text{color:#5d4635;line-height:20px;margin-top:6px}
</style>
</head>
<body>
<div id="app"><div class="page-container" id="pg"></div><div class="tab-bar" id="tab"></div></div>
<script>
const S={activeTab:0,points:320,timer:false,streak:7,box:null,planDraft:'',diary:'今天比昨天多坚持了 20 分钟，已经很棒了。',newPost:'',saved:0,cardOpen:false};
let items=[{id:'1',name:'背诵废萝卜',rarity:'普通款',desc:'头顶《肖四》，眼神清澈但灵魂迷茫。',unlocked:true},{id:'2',name:'咖啡续命萝卜',rarity:'普通款',desc:'凌晨两点仍在续命，手里永远拿着冰美式。',unlocked:true},{id:'3',name:'正义大法官萝卜',rarity:'稀有款',desc:'穿法袍、拿法槌，讲话自带判词音效。',unlocked:false},{id:'4',name:'上岸萝卜',rarity:'隐藏款',desc:'抱着录取通知书，金光闪闪。',unlocked:false}];
const pool=[{id:'b1',name:'背诵废萝卜',rarity:'普通款',desc:'今天又把法条背成了口号。'},{id:'b2',name:'咖啡续命萝卜',rarity:'普通款',desc:'咖啡因含量高于自信心。'},{id:'b3',name:'正义大法官萝卜',rarity:'稀有款',desc:'一锤定音，卷王退散。'},{id:'b4',name:'上岸萝卜',rarity:'隐藏款',desc:'把录取通知书攥在手里。'}];
let posts=[{id:'p1',author:'今晚吃不下肖四的考研胡萝卜',text:'今天主观题写到手抽筋，感觉自己快变成萝卜干了。',likes:12,waters:8,createdAt:'2026-06-03 21:18'},{id:'p2',author:'跨考法考的焦虑橙子',text:'背诵进度有点慢，但我还在撑。',likes:8,waters:14,createdAt:'2026-06-03 09:42'}];
let plans=[{id:'p1',title:'背 50 个单词',note:'早上完成',date:'2026-06-04',done:true},{id:'p2',title:'整理法条笔记',note:'今晚完成',date:'2026-06-04',done:false}];
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};

function render(){renderTab();renderPages();}
const tabs=[{k:'🥕',l:'萝卜基地'},{k:'📝',l:'萝卜计划'},{k:'🎁',l:'收藏中心'},{k:'💬',l:'随记'}];
function renderTab(){document.getElementById('tab').innerHTML=tabs.map((t,i)=>'<div class="tab-item" onclick="switchTab('+i+')"><div class="tab-icon-wrap'+(S.activeTab===i?' active':'')+'"><span class="tab-icon">'+t.k+'</span></div><span class="tab-label'+(S.activeTab===i?' active':'')+'">'+t.l+'</span></div>').join('');}
function switchTab(i){S.activeTab=i;renderTab();renderPages();}

function renderPages(){
const h=[renderHome,renderPlan,renderCollect,renderCommunity];
document.getElementById('pg').innerHTML=h.map((f,i)=>f(i)).join('');
}

function renderHome(i){
const p=Math.min(100,Math.round((S.points/500)*100)),n=24,c=Math.round(p/100*n);
let dots='';
for(let j=0;j<n;j++){const a=(j/n)*Math.PI*2,x=120+Math.cos(a-Math.PI/2)*95-9,y=120+Math.sin(a-Math.PI/2)*95-9,ac=j<c;dots+='<div class="ring-dot" style="left:'+x+'px;top:'+y+'px;background:'+(ac?'#ff8f3a':'#ead8c9')+';opacity:'+(ac?1:.45)+'"></div>';}
const focus=plans.find(p=>!p.done)?.title??'今日计划已完成';
return '<div class="page'+(S.activeTab===i?' active':'')+'"><p class="kicker">Overview</p><p class="title">萝卜计划</p><p class="subtitle">今日进度与任务概览。</p><div class="hero-area"><div class="hero-rings">'+dots+'<div class="hero-core"><span class="hero-emoji">🥕</span><span class="hero-num" id="hp">'+p+'%</span></div></div></div><div class="stat-band"><div class="stat-item"><p class="stat-lb">连续打卡</p><p class="stat-val">'+S.streak+' 天</p></div><div class="stat-div"></div><div class="stat-item"><p class="stat-lb">状态</p><p class="stat-val">'+(S.timer?'专注中':'待开始')+'</p></div></div><div class="section"><div class="section-head"><span class="section-title">习惯</span><span class="section-meta">今日轻量打卡</span></div><div class="habit-rail"><div class="habit-pill" onclick="earn(20)">早起</div><div class="habit-pill" onclick="earn(20)">三餐</div><div class="habit-pill" onclick="earn(20)">睡觉</div></div></div><div style="margin-top:12px"><p class="task-text">'+focus+'</p><button class="btn" onclick="focusTask()">'+(S.timer?'专注中…':'开始专注')+'</button></div><div class="status-strip">今日状态：已完成 1 / 3</div></div>';
}
function earn(a){S.points+=a;const e=document.getElementById('hp');if(e)e.textContent=Math.min(100,Math.round((S.points/500)*100))+'%';}
function focusTask(){if(S.timer)return;S.timer=true;setTimeout(()=>{S.timer=false;S.points+=100;S.streak++;plans=plans.map(p=>p.id==='p2'?{...p,done:true,note:p.note+' · 已完成'}:p);alert('成功啃掉今日任务\n胡萝卜素 +100！');render();},1400);renderPages();}

function renderPlan(i){
const today=plans[0]?.date??todayStr(),tp=plans.filter(p=>p.date===today),dc=plans.filter(p=>p.done).length;
return '<div class="page'+(S.activeTab===i?' active':'')+'"><p class="kicker">Plan</p><p class="title">萝卜计划</p><p class="subtitle">今日计划、完成状态、每日记录与归档。</p><div class="spacer-14"></div><div class="section"><div class="section-head"><span class="section-title">今日计划</span><span class="section-meta">新增并安排今天要做的事</span></div><input class="input-field" id="d" placeholder="背 20 个单词" value="'+S.planDraft+'" oninput="S.planDraft=this.value"><div class="spacer-12"></div><button class="btn" onclick="addPlan()">添加</button></div><div class="spacer-14"></div><div class="section"><div class="section-head"><span class="section-title">完成状态</span><span class="section-meta">'+dc+' / '+plans.length+' 已完成</span></div>'+(tp.length?tp.map(p=>'<div class="plan-row'+(p.done?' done':'')+'" onclick="togPlan(\''+p.id+'\')"><div><p class="plan-name">'+p.title+'</p><p class="plan-note">'+p.note+'</p></div><span class="plan-state'+(p.done?' done':'')+'">'+(p.done?'已完成':'未完成')+'</span></div>').join(''):'')+'</div><div class="spacer-14"></div><div class="section"><div class="section-head"><span class="section-title">每日记录</span><span class="section-meta">按天查看执行情况</span></div>'+plans.map(p=>'<div class="plan-row" style="cursor:default"><div><p style="color:#a06b3b;font-weight:700;font-size:12px">'+p.date+'</p><p class="plan-name" style="margin-top:4px">'+p.title+'</p><p class="plan-note">'+p.note+'</p></div><span class="plan-state'+(p.done?' done':'')+'">'+(p.done?'已完成':'进行中')+'</span></div>').join('')+'</div></div>';
}
function addPlan(){if(!S.planDraft.trim())return;plans.unshift({id:String(Date.now()),title:S.planDraft.trim(),note:'今日新增',date:todayStr(),done:false});S.planDraft='';renderPages();}
function togPlan(id){plans=plans.map(p=>p.id===id?{...p,done:!p.done,note:p.done?p.note:p.note+' · 已完成'}:p);renderPages();}

function renderCollect(i){
const uc=items.filter(x=>x.unlocked).length;
return '<div class="page'+(S.activeTab===i?' active':'')+'"><p class="kicker">Collection</p><p class="title">收藏中心</p><p class="subtitle">在这里抽取奖励，也查看收集成果。</p><div class="spacer-14"></div><div class="section" style="display:flex;flex-direction:column;align-items:center;gap:10px"><span class="section-title">盲盒抽取</span><span class="section-meta">当前胡萝卜素 '+S.points+'</span><button class="btn" onclick="openBox()" style="max-width:200px">单抽一次</button></div><div class="spacer-14"></div><div class="section"><div class="section-head"><span class="section-title">收集成果</span><span class="section-meta">已收集 '+uc+' / '+items.length+'</span></div>'+items.map(x=>'<div class="col-item"><p class="item-name">'+(x.unlocked?x.name:'未解锁')+'</p><p class="item-rare">'+(x.unlocked?x.rarity:'隐藏剪影')+'</p><p class="item-desc">'+(x.unlocked?x.desc:'继续努力，解锁这只萝卜。')+'</p></div>').join('')+'</div><div class="spacer-14"></div><button class="btn" onclick="alert(\'分享海报\\nMVP 里先保留一键海报的入口。\')">生成收纳箱海报</button>'+(S.box?'<div class="modal-overlay" onclick="if(event.target===this)closeBox()"><div class="modal-box"><div class="modal-glow"></div><p style="font-size:16px;color:#a06b3b;font-weight:600">恭喜抽中</p><p style="font-size:28px;font-weight:800;color:#2d1e10">'+S.box.name+'</p><p style="font-size:14px;color:#ff8f3a;font-weight:700">'+S.box.rarity+'</p><p style="color:#7d5c44;text-align:center;line-height:20px">'+S.box.desc+'</p><button class="btn" onclick="closeBox()">收下它</button></div></div>':'')+'</div>';
}
function openBox(){if(S.points<500){alert('胡萝卜素不足\n再努力一点，就能抽盲盒了。');return}S.points-=500;const r=pool[Math.floor(Math.random()*pool.length)];S.box=r;items=items.map(x=>x.name===r.name?{...x,unlocked:true}:x);renderPages();}
function closeBox(){S.box=null;renderPages();}

function renderCommunity(i){
return '<div class="page'+(S.activeTab===i?' active':'')+'"><p class="kicker">Notes</p><p class="title">随记</p><p class="subtitle">点开一张萝卜卡，写完后折好收进纸箱。</p><div class="spacer-14"></div><div class="community-stage"><div class="c-cta" onclick="toggleCard()"><div class="c-leaves">'+(S.cardOpen?'<div class="c-leaf" style="background:#4a8c3a;transform:rotate(-34deg);left:28px;top:2px;height:30px"></div><div class="c-leaf" style="background:#7ec957;height:38px;top:-4px"></div><div class="c-leaf" style="background:#4a8c3a;transform:rotate(34deg);right:28px;top:2px;height:30px"></div>':'')+'</div><div class="c-body"><div class="c-tip"></div><span class="c-emoji">🥕</span><span class="c-text">记录</span></div></div>'+(S.cardOpen?'<div class="c-card"><div class="c-head"><span class="c-label">Roibo Note</span><span class="c-count">已收纳 '+S.saved+'</span></div><div class="c-shell"><div class="c-edit"><textarea placeholder="写下今天的感受" oninput="S.diary=this.value">'+S.diary+'</textarea></div></div><button class="btn" onclick="saveNote()">折好，放进纸箱</button></div>':'')+'</div><div class="spacer-14"></div><p style="font-size:18px;font-weight:800;color:#2d1e10">纸箱存档</p><p style="font-size:14px;color:#7d5c44;margin-top:4px">只保留自己的随记，按日期和时间归档。</p><div class="archive-box">'+posts.map(p=>'<div class="arch-item"><p class="arch-date">'+p.createdAt+'</p><p class="arch-text">'+p.text+'</p></div>').join('')+'</div></div>';
}
function toggleCard(){S.cardOpen=!S.cardOpen;renderPages();}
function saveNote(){S.saved++;S.cardOpen=false;posts.unshift({id:String(Date.now()),author:'我的随记',text:S.diary.trim()||'记录了一条心情',likes:0,waters:0,createdAt:todayStr()+' '+String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0')});renderPages();}

render();
</script>
</body>
</html>
